id = "asplos24_crocus"

[case_brief]
core_claim = "Build the Crocus Docker image and reproduce the paper's empirical results: the Wasm 1.0 -> ARM aarch64 Table 1 verification counts, the six instruction-lowering case-study bug reproductions, and the Section 4.2 rule-coverage percentages."
acceptable_evidence = """The Docker image builds from the artifact Dockerfile and contains the experiment toolchain (z3, cargo, rustc, python3 plus matplotlib/tabulate). The agent runs the experiments and saves each command's stdout into a results directory inside its workspace at `crocus-results/`, containing: `table1.txt` (stdout of scripts/wasm1.0-to-aarch64.py), `cdf.pdf` (Figure 4 output), `cs_4_3_1.txt`, `cs_4_3_2.txt`, `cs_4_3_3.txt`, `cs_4_4_1.txt`, `cs_4_4_2.txt`, `cs_4_4_4.txt` (stdout of each case-study command), and `coverage_wasmtime.txt`, `coverage_rustc.txt` (stdout of rule-stats.py on the pre-saved CSVs). Table 1 totals (98 rules, 377 type instructions) and failure counts (2, 4) must match; each case study must show its expected verification signature; coverage percentages must match the reference."""
allowed_tolerance = "Counterexample hex/bit values differ between runs and are ignored. Table 1 success/timeout counts may vary slightly with the Z3 version, but rule/type-instruction totals and failure counts must match the reference exactly. Coverage percentages are deterministic (computed on pre-saved CSVs)."

[run]
id = "asplos24_crocus"

[run.instructions]
path = "README.md"

[run.runtime]
mode = "docker"
image = "aebench-agent:latest"
timeout_ms = 14400000
gpu = false
interactive = false

[run.artifact_requirements]
docker = true
compose = false

[run.prompt]
profile = "artifact-eval-v1"

[oracle]
expected_score = 4
phases = ["env_setup", "artifact_build", "benchmark_prep", "experiment_runs"]
score_mode = "phase_count"
failure_mode = "fail_fast"
placeholder = false

[oracle.runtime]
mode = "docker"
image = "crocus"
app_dir = "/root/wasmtime/cranelift/isle/veri/veri_engine"

[upstream]
source_type = "git"
url = "https://github.com/avanhatt/asplos24-ae-crocus"
ref = "762320d87b288ac06d67e790935f3a7d7cd7ea92"
