id = "asplos25_golf"

[case_brief]
core_claim = "build golf in a docker container and reproduce the benchmark outputs inside it"
acceptable_evidence = "build artifacts present, datasets at expected sizes"
allowed_tolerance = "Results may vary across environments but must preserve the reference trend."

[run]
id = "asplos25_golf"

[run.instructions]
path = "README.md"

[run.runtime]
mode = "docker"
image = "aebench-agent:latest"
timeout_ms = 14400000
gpu = false
interactive = false

[run.artifact_requirements]
docker = true
compose = false

[run.prompt]
profile = "artifact-eval-v1"

[oracle]
expected_score = 4
phases = ["env_setup", "artifact_build", "benchmark_prep", "experiment_runs"]
score_mode = "phase_count"
failure_mode = "fail_fast"
placeholder = false

[oracle.targets.golf]
type = "docker_image"
image = "golf"
working_dir = "/usr/app"

[oracle.phase_targets]
env_setup = "local"
artifact_build = "golf"
benchmark_prep = "golf"
experiment_runs = "local"

[upstream]
source_type = "git"
url = "https://github.com/VladSaioc/ASPLOS-artifact-2025"
ref = "d00cf120331fc5dcaf43d37788bbc041f8b99abe"
resolved_at = "2026-04-11T02:02:17.900240+00:00"
