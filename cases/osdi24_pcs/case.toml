id = "osdi24_pcs"

[case_brief]
core_claim = "Build PCS, run the scheduling simulator across multiple workloads and policies, and reproduce the JCT and prediction error metrics reported in the paper."
acceptable_evidence = "The oracle accepts result CSVs for each scheduling policy and workload whose average JCT and prediction error distributions correlate with bundled reference data at the required Pearson similarity threshold."
allowed_tolerance = "Results may vary across environments but must preserve the reference trend."

[paper]
title = "When will my ML Job finish? Toward providing Completion Time Estimates through Predictability-Centric Scheduling"
venue = "OSDI 2024"
url = "https://www.usenix.org/system/files/osdi24-bin-faisal.pdf"
sha256 = "9eab29c751d48c89fc992596dc055c756a1db0268d7a52629d5ace3c243ec926"

[run]
id = "osdi24_pcs"

[run.instructions]
path = "README.md"

[run.runtime]
mode = "docker"
timeout_ms = 14400000
gpu = false
interactive = false

[run.prompt]
profile = "artifact-eval-v1"

[oracle]
expected_score = 4
phases = ["env_setup", "artifact_build", "benchmark_prep", "experiment_runs"]
score_mode = "phase_count"
failure_mode = "fail_fast"
placeholder = false

[oracle.runtime]
mode = "inherit"

[upstream]
source_type = "git"
url = "https://github.com/TuftsNATLab/PCS"
ref = "4ed6b2e45b31e9654359b8584caa5c54b381d3ef"
requested_ref = "main"
resolved_at = "2026-07-02T00:00:00+00:00"
