id = "osdi24_kondo"

[case_brief]
core_claim = "Set up the Kondo artifact and reproduce the SLOC statistics for the evaluated distributed protocols, showing that invariant taxonomy reduces proof size."
acceptable_evidence = "The oracle accepts a sloc.csv whose sync_spec, manual_proof, and sync_proof line counts for each evaluated protocol match the bundled reference values within ±5 lines."
allowed_tolerance = "SLOC counts must stay within ±5 lines of reference for each protocol and field."

[paper]
title = "Inductive Invariants That Spark Joy: Using Invariant Taxonomies to Streamline Distributed Protocol Proofs"
venue = "OSDI 2024"
url = "https://www.usenix.org/system/files/osdi24-zhang-nuda.pdf"
sha256 = "9135ec91c851760ba309aba74e2f75d3335ffad785ddfcee2ff6d4f418865e7d"

[run]
id = "osdi24_kondo"

[run.instructions]
path = "README.md"

[run.runtime]
mode = "docker"
timeout_ms = 14400000
gpu = false
interactive = false

[run.prompt]
profile = "artifact-eval-v1"
append = """
Install JDK 17. In `local-dafny`, run `make z3-ubuntu` on Linux (`make z3-mac` on macOS), then run `make`.

Run `./verify-all 2>&1 | tee ../verify-all.log` from `kondoPrototypes`, then move the log to `kondoPrototypes/verify-all.log`. Run `python3 eval.py` from `kondoPrototypes/evaluation` to generate `sloc.csv`.

If verification times out on a lower-core machine, increase the verification scripts' `/timeLimit`; all sections must complete with zero errors and no timeouts.
"""

[oracle]
expected_score = 4
phases = ["env_setup", "artifact_build", "benchmark_prep", "experiment_runs"]
score_mode = "phase_count"
failure_mode = "fail_fast"
placeholder = false

[upstream]
source_type = "git"
url = "https://github.com/GLaDOS-Michigan/Kondo"
ref = "1d6c43e475cadfdf7a10bfb5137cd777ccf2138f"
resolved_at = "2026-04-11T02:10:16.226850+00:00"
